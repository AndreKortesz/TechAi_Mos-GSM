<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mos-GSM AI — Ассистент СКУД & СВН</title>
<link rel="icon" href="/static/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@300;400;700&family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FFFFFF;--bg2:#F5F5F5;--bg3:#EBEBEB;--bg4:#D9D9D9;
  --accent:#D4A53A;--accent2:#B8912E;--accent-dim:rgba(212,165,58,.08);
  --text:#1A1A1A;--text2:#4D4D4D;--text3:#9A9A9A;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Roboto Condensed','Roboto',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

.app{display:grid;grid-template-columns:280px 1fr;height:100vh}

/* Sidebar */
.sidebar{background:#F5F3EF;border-right:1px solid #E5E2DC;display:flex;flex-direction:column;padding:16px;color:#1A1A1A}
.sidebar-header{display:flex;align-items:center;gap:10px;padding:8px 4px 20px;border-bottom:1px solid #E5E2DC;margin-bottom:12px}
.logo-mark{width:36px;height:36px;border-radius:10px;background:#1A1A1A;display:flex;align-items:flex-end;justify-content:center;gap:2px;padding-bottom:6px}
.logo-mark i{display:block;width:4px;border-radius:1.5px;background:#F3C04D}
.logo-mark i:nth-child(1){height:4px}
.logo-mark i:nth-child(2){height:8px}
.logo-mark i:nth-child(3){height:13px}
.logo-mark i:nth-child(4){height:18px}
.logo-text{font-size:17px;font-weight:700;letter-spacing:-.3px;font-family:'Roboto',sans-serif;color:#1A1A1A}
.logo-text span{color:#C9982E}
.new-chat-btn{width:100%;padding:10px;border-radius:var(--radius-sm);border:1px dashed #C8C4BC;background:transparent;color:#6B6560;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}
.new-chat-btn:hover{border-color:#C9982E;color:#C9982E;background:rgba(201,152,46,.06)}
.chat-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.chat-list::-webkit-scrollbar{width:4px}
.chat-list::-webkit-scrollbar-thumb{background:#C8C4BC;border-radius:2px}
.chat-item{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:.15s;font-size:13px;color:#6B6560;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:8px}
.chat-item:hover{background:rgba(0,0,0,.04);color:#1A1A1A}
.chat-item.active{background:rgba(201,152,46,.1);color:#9A7520}
.chat-item .dot{width:6px;height:6px;border-radius:50%;background:#D4A53A;flex-shrink:0}
.sidebar-footer{padding-top:12px;border-top:1px solid #E5E2DC;margin-top:12px;font-size:12px;color:#9A9590;text-align:center;line-height:1.5}
.sidebar-footer a{color:#C9982E;text-decoration:none}

/* Main */
.main{display:flex;flex-direction:column;height:100vh;position:relative}
.main::before{content:'';position:absolute;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(243,192,77,.06),transparent 70%);pointer-events:none}

/* Header */
.chat-header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);z-index:2}
.header-avatar{width:34px;height:34px;border-radius:10px;background:var(--accent);display:flex;align-items:flex-end;justify-content:center;gap:1.5px;padding-bottom:5px}
.header-avatar i{display:block;width:3px;border-radius:1px;background:#1A1A1A}
.header-avatar i:nth-child(1){height:3px}
.header-avatar i:nth-child(2){height:6px}
.header-avatar i:nth-child(3){height:10px}
.header-avatar i:nth-child(4){height:14px}
.header-info h2{font-size:15px;font-weight:600}
.header-info p{font-size:12px;color:var(--accent);display:flex;align-items:center;gap:5px}
.header-info p::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block}
.header-model{margin-left:auto;padding:5px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);font-size:11px;font-weight:500;color:var(--text2);font-family:'JetBrains Mono',monospace}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px}
.messages::-webkit-scrollbar{width:5px}
.messages::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}

/* ═══ ФОРМА КП ═══ */
.kp-form-container{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:30px;gap:20px}
.kp-form{background:#FAFAFA;border:1px solid var(--border2);border-radius:16px;padding:28px 32px;width:100%;max-width:520px;box-shadow:0 4px 24px rgba(0,0,0,.04)}
.kp-form-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px;color:var(--text)}
.kp-form-title svg{width:24px;height:24px;color:var(--accent)}
.kp-field{margin-bottom:18px}
.kp-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.kp-radio-group{display:flex;gap:8px;flex-wrap:wrap}
.kp-radio{display:none}
.kp-radio-label{padding:10px 16px;border-radius:8px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:.2s;user-select:none}
.kp-radio-label:hover{border-color:var(--accent);color:var(--accent2)}
.kp-radio:checked + .kp-radio-label{background:var(--accent);color:#1A1A1A;border-color:var(--accent);font-weight:600}
.kp-radio-label small{display:block;font-size:10px;font-weight:400;opacity:.7;margin-top:2px}
.kp-input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--border2);font-family:inherit;font-size:14px;color:var(--text);background:var(--bg);transition:.2s;resize:none}
.kp-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(212,165,58,.1)}
.kp-input::placeholder{color:var(--text3)}
textarea.kp-input{min-height:80px}
.kp-checkbox-wrap{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.kp-checkbox{width:20px;height:20px;accent-color:var(--accent);cursor:pointer}
.kp-checkbox-text{font-size:14px;color:var(--text2);cursor:pointer}
.kp-submit{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#D4A53A 0%,#B8912E 100%);color:#1A1A1A;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.kp-submit:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,165,58,.3)}
.kp-submit:active{transform:translateY(0)}
.kp-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.kp-submit svg{width:18px;height:18px}
.kp-divider{display:flex;align-items:center;gap:16px;width:100%;max-width:520px;color:var(--text3);font-size:13px}
.kp-divider::before,.kp-divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.kp-hint{font-size:12px;color:var(--text3);text-align:center;max-width:400px;line-height:1.5}

/* Messages */
.msg{display:flex;gap:12px;max-width:85%;animation:fadeIn .3s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.ai .msg-avatar{background:var(--accent);display:flex;align-items:flex-end;justify-content:center;gap:1px;padding-bottom:4px}
.msg.ai .msg-avatar i{display:block;width:3px;border-radius:1px;background:#1A1A1A}
.msg.ai .msg-avatar i:nth-child(1){height:3px}
.msg.ai .msg-avatar i:nth-child(2){height:6px}
.msg.ai .msg-avatar i:nth-child(3){height:9px}
.msg.ai .msg-avatar i:nth-child(4){height:13px}
.msg.user .msg-avatar{background:var(--bg3);border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text2)}
.msg-body{display:flex;flex-direction:column;gap:4px}
.msg-text{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7}
.msg.ai .msg-text{background:var(--bg2);border:1px solid var(--border);border-top-left-radius:4px}
.msg.user .msg-text{background:rgba(212,165,58,.06);border:1px solid rgba(212,165,58,.18);border-top-right-radius:4px}
.msg-text h1,.msg-text h2,.msg-text h3{margin:16px 0 8px;font-weight:700}
.msg-text h2{font-size:16px}
.msg-text h3{font-size:14px;color:#8B6914}
.msg-text p{margin:6px 0}
.msg-text ul,.msg-text ol{margin:8px 0;padding-left:24px}
.msg-text li{margin:4px 0}
.msg-text code{background:#F0EDE6;padding:2px 7px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#8B6914}
.msg-text pre{background:#F7F5F0;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin:10px 0;overflow-x:auto}
.msg-text pre code{background:none;padding:0;font-size:12px;color:var(--text)}
.msg-text strong{color:#1A1A1A;font-weight:700}
.msg-text a{color:#8B6914;text-decoration:none}
.msg-text a:hover{text-decoration:underline}
.msg-text table{border-collapse:collapse;margin:10px 0;width:100%}
.msg-text th,.msg-text td{padding:8px 12px;border:1px solid var(--border);font-size:13px;text-align:left}
.msg-text th{background:var(--bg3);font-weight:600}
.msg-time{font-size:11px;color:var(--text3);padding:0 4px}
.msg.user .msg-time{text-align:right}
.msg-sources{display:flex;flex-wrap:wrap;gap:6px;padding:0 4px}
.source-chip{font-size:11px;padding:3px 10px;border-radius:6px;background:rgba(212,165,58,.08);color:#8B6914;border:1px solid rgba(212,165,58,.2);font-family:'JetBrains Mono',monospace;text-decoration:none;transition:.2s}
.source-chip:hover{background:rgba(212,165,58,.16)}

/* Status */
.status-indicator{display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;max-width:380px;animation:fadeIn .3s ease}
.status-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.status-text{display:flex;flex-direction:column;gap:2px}
.status-text span{font-size:11px;font-weight:400;opacity:.7}
.status-indicator.searching{background:rgba(212,165,58,.06);border:1px solid rgba(212,165,58,.15);color:#8B6914}
.status-indicator.searching .status-icon{background:rgba(212,165,58,.12)}
.search-progress{height:2px;background:rgba(212,165,58,.15);border-radius:1px;margin-top:8px;overflow:hidden;width:100%}
.search-progress-bar{height:100%;background:var(--accent);border-radius:1px;animation:searchSweep 2.5s ease-in-out infinite}
@keyframes searchSweep{0%{width:0;margin-left:0}50%{width:70%;margin-left:15%}100%{width:0;margin-left:100%}}
.status-indicator.thinking{background:rgba(0,0,0,.03);border:1px solid var(--border);color:var(--text2)}
.status-indicator.thinking .status-icon{background:var(--bg3)}
.thinking-dots{display:flex;gap:3px;align-items:center;height:16px}
.thinking-dots i{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:thinkWave 1.4s ease-in-out infinite}
.thinking-dots i:nth-child(2){animation-delay:.15s}
.thinking-dots i:nth-child(3){animation-delay:.3s}
.thinking-dots i:nth-child(4){animation-delay:.45s}
@keyframes thinkWave{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-6px);opacity:1}}

/* Input */
.input-area{padding:16px 24px 20px;background:linear-gradient(to top,rgba(255,255,255,1) 80%,rgba(255,255,255,0));position:relative}
.input-wrap{display:flex;gap:10px;align-items:flex-end;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:6px 6px 6px 16px;transition:.2s;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.input-wrap:focus-within{border-color:var(--accent);box-shadow:0 2px 20px rgba(212,165,58,.1)}
.input-wrap textarea{flex:1;border:none;outline:none;font-family:inherit;font-size:14px;line-height:1.5;resize:none;min-height:24px;max-height:150px;padding:8px 0;color:var(--text);background:transparent}
.input-wrap textarea::placeholder{color:var(--text3)}
.send-btn{width:40px;height:40px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#1A1A1A;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.send-btn:hover{background:var(--accent2);transform:scale(1.04)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px}
.input-hint{text-align:center;font-size:11px;color:var(--text3);margin-top:8px}

@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .kp-form{padding:20px}
  .kp-radio-group{flex-direction:column}
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark"><i></i><i></i><i></i><i></i></div>
      <div class="logo-text">Mos-<span>GSM</span></div>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ Новый чат</button>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">
      <span id="userInfo"></span><br>
      <a href="/logout">Выйти</a><br>
      TechBase AI v1.0 · <a href="https://mos-gsm.ru" target="_blank">mos-gsm.ru</a>
    </div>
  </aside>

  <main class="main">
    <header class="chat-header">
      <div class="header-avatar"><i></i><i></i><i></i><i></i></div>
      <div class="header-info">
        <h2>Mos-GSM AI</h2>
        <p>Онлайн — СКУД & СВН эксперт</p>
      </div>
      <div class="header-model">cLaude-sonnet-4.5</div>
    </header>

    <div class="messages" id="messages">
      <div class="kp-form-container" id="kpFormContainer">
        <form class="kp-form" id="kpForm" onsubmit="submitKP(event)">
          <div class="kp-form-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Быстрое КП
          </div>

          <div class="kp-field">
            <label class="kp-label">Юрлицо</label>
            <div class="kp-radio-group">
              <input type="radio" name="legal" value="ip_kontorin" id="le1" class="kp-radio" checked>
              <label for="le1" class="kp-radio-label">ИП Конторин<small>без НДС</small></label>
              <input type="radio" name="legal" value="ooo_infinity" id="le2" class="kp-radio">
              <label for="le2" class="kp-radio-label">ООО Инфинити<small>НДС 22%</small></label>
              <input type="radio" name="legal" value="ip_timofeev" id="le3" class="kp-radio">
              <label for="le3" class="kp-radio-label">ИП Тимофеев<small>без НДС</small></label>
            </div>
          </div>

          <div class="kp-field">
            <label class="kp-label">Клиент</label>
            <input type="text" class="kp-input" id="kpClient" placeholder="Название компании или ФИО" required>
          </div>

          <div class="kp-field">
            <label class="kp-label">Что нужно</label>
            <textarea class="kp-input" id="kpNeeds" placeholder="Например: 4 камеры 2Мп, регистратор с PoE, диск 1ТБ" required></textarea>
          </div>

          <div class="kp-checkbox-wrap">
            <input type="checkbox" class="kp-checkbox" id="kpMontage" checked>
            <label for="kpMontage" class="kp-checkbox-text">Включить монтажные работы</label>
          </div>

          <button type="submit" class="kp-submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            Сформировать КП
          </button>
        </form>

        <div class="kp-divider">или задайте вопрос в чате</div>
        <p class="kp-hint">Для сложных проектов и консультаций используйте чат ниже</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="input" placeholder="Задайте вопрос по СКУД или СВН оборудованию..." rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-hint">Mos-GSM AI · Claude + веб-поиск &nbsp;|&nbsp; Enter · отправить &nbsp;|&nbsp; Shift+Enter · новая строка</div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const chatListEl = document.getElementById('chatList');
const kpFormContainer = document.getElementById('kpFormContainer');

let sessionId = null;
let isGenerating = false;
let chatStore = {};
let userInitials = 'U';

marked.setOptions({breaks:true,gfm:true});
function renderMd(text){return marked.parse(text||'')}

function getInitials(name){
  if(!name)return'U';
  const parts=name.trim().split(' ');
  if(parts.length>=2)return(parts[0][0]+parts[1][0]).toUpperCase();
  return name.substring(0,2).toUpperCase();
}

function hideKPForm(){if(kpFormContainer)kpFormContainer.style.display='none'}

async function submitKP(e){
  e.preventDefault();
  const legal = document.querySelector('input[name="legal"]:checked').value;
  const client = document.getElementById('kpClient').value.trim();
  const needs = document.getElementById('kpNeeds').value.trim();
  const montage = document.getElementById('kpMontage').checked;
  if(!client || !needs) return;
  
  const legalNames = {'ip_kontorin':'ИП Конторин','ooo_infinity':'ООО Инфинити Буст','ip_timofeev':'ИП Тимофеев'};
  let prompt = `Составь КП от ${legalNames[legal]} для клиента "${client}". Нужно: ${needs}. ${montage?'С монтажом.':'Только оборудование.'}`;
  
  hideKPForm();
  inputEl.value = prompt;
  await send();
  document.getElementById('kpForm').reset();
  document.getElementById('le1').checked = true;
}

function formatTime(){return new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}

function addMessage(text, type, sources=[], skipAnim=false){
  hideKPForm();
  const msg = document.createElement('div');
  msg.className = `msg ${type}`;
  
  let avatar = type==='ai' 
    ? '<div class="msg-avatar"><i></i><i></i><i></i><i></i></div>'
    : `<div class="msg-avatar">${userInitials}</div>`;
  
  let sourcesHtml = sources.length 
    ? `<div class="msg-sources">${sources.map(s=>`<a href="${s.url}" target="_blank" class="source-chip">${s.title||s.url}</a>`).join('')}</div>` 
    : '';
  
  msg.innerHTML = `${avatar}<div class="msg-body"><div class="msg-text">${type==='ai'?renderMd(text):text}</div>${sourcesHtml}<div class="msg-time">${formatTime()}</div></div>`;
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return msg;
}

function addTyping(){
  const el = document.createElement('div');
  el.className = 'status-indicator thinking';
  el.id = 'typingIndicator';
  el.innerHTML = '<div class="status-icon"><div class="thinking-dots"><i></i><i></i><i></i><i></i></div></div><div class="status-text">Генерирую ответ<span>Claude обрабатывает запрос</span></div>';
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeTyping(){const el=document.getElementById('typingIndicator');if(el)el.remove()}

function addSearchIndicator(){
  removeSearchIndicator();
  const el = document.createElement('div');
  el.className = 'status-indicator searching';
  el.id = 'searchIndicator';
  el.innerHTML = '<div class="status-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div><div class="status-text">Ищу в интернете<span>Поиск актуальной информации</span><div class="search-progress"><div class="search-progress-bar"></div></div></div>';
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeSearchIndicator(){const el=document.getElementById('searchIndicator');if(el)el.remove()}

async function send(){
  const text = inputEl.value.trim();
  if(!text || isGenerating) return;
  
  isGenerating = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  
  hideKPForm();
  addMessage(text, 'user');
  addTyping();
  
  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, session_id: sessionId})
    });
    
    if(res.status === 401){ window.location.href = '/login'; return; }
    removeTyping();
    
    const aiMsg = addMessage('', 'ai');
    const streamText = aiMsg.querySelector('.msg-text');
    let fullText = '';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    
    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      const chunk = decoder.decode(value, {stream:true});
      for(const line of chunk.split('\n')){
        if(!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if(data.type === 'text'){
            fullText += data.content;
            streamText.innerHTML = renderMd(fullText);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } else if(data.type === 'search_start') addSearchIndicator();
          else if(data.type === 'search_done') removeSearchIndicator();
          else if(data.type === 'done'){
            sessionId = data.session_id;
            if(!chatStore[sessionId]) chatStore[sessionId] = [];
            chatStore[sessionId].push({type:'user', text});
            chatStore[sessionId].push({type:'ai', text:fullText});
            updateChatList(text);
          } else if(data.type === 'error') streamText.innerHTML = renderMd(`Ошибка: ${data.content}`);
        } catch(e){}
      }
    }
  } catch(err){
    removeTyping();
    addMessage(`Ошибка: ${err.message}`, 'ai');
  } finally {
    isGenerating = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}

inputEl.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 150) + 'px';
});

function newChat(){
  sessionId = null;
  messagesEl.innerHTML = '';
  if(kpFormContainer){messagesEl.appendChild(kpFormContainer);kpFormContainer.style.display=''}
  document.querySelectorAll('.chat-item').forEach(c => c.classList.remove('active'));
  inputEl.focus();
}

async function switchChat(sid){
  if(sid === sessionId || isGenerating) return;
  sessionId = sid;
  messagesEl.innerHTML = '';
  hideKPForm();
  document.querySelectorAll('.chat-item').forEach(c => c.classList.toggle('active', c.dataset.id === sid));
  
  if(chatStore[sid]?.length){
    chatStore[sid].forEach(m => addMessage(m.text, m.type, [], true));
  } else {
    try {
      const res = await fetch(`/api/sessions/${sid}/messages`);
      if(res.ok){
        const msgs = await res.json();
        msgs.forEach(m => addMessage(m.content, m.role==='user'?'user':'ai', [], true));
        chatStore[sid] = msgs.map(m => ({type:m.role==='user'?'user':'ai', text:m.content}));
      }
    } catch(e){}
  }
  inputEl.focus();
}

function updateChatList(firstMessage){
  if(!sessionId) return;
  if(document.querySelector(`.chat-item[data-id="${sessionId}"]`)) return;
  
  const item = document.createElement('div');
  item.className = 'chat-item active';
  item.dataset.id = sessionId;
  item.innerHTML = `<div class="dot"></div>${firstMessage.substring(0,35)}${firstMessage.length>35?'...':''}`;
  document.querySelectorAll('.chat-item').forEach(c => c.classList.remove('active'));
  item.onclick = () => switchChat(sessionId);
  chatListEl.prepend(item);
}

async function loadSessions(){
  try {
    const res = await fetch('/api/sessions');
    if(res.status === 401){ window.location.href = '/login'; return; }
    if(!res.ok) return;
    const sessions = await res.json();
    chatListEl.innerHTML = '';
    sessions.forEach(s => {
      const item = document.createElement('div');
      item.className = 'chat-item';
      item.dataset.id = s.id;
      const title = s.title || 'Новый чат';
      item.innerHTML = `<div class="dot"></div>${title.substring(0,35)}${title.length>35?'...':''}`;
      item.onclick = () => switchChat(s.id);
      chatListEl.appendChild(item);
    });
  } catch(e){}
}

async function loadUser(){
  try {
    const res = await fetch('/auth/me');
    if(res.status === 401){ window.location.href = '/login'; return; }
    if(res.ok){
      const user = await res.json();
      document.getElementById('userInfo').textContent = user.name || '';
      userInitials = getInitials(user.name || '');
    }
  } catch(e){}
}

loadUser();
loadSessions();
inputEl.focus();
</script>
